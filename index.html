document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];\n  DW = ['อา.','จ.','อ.','พ.','พฤ.','ศ.','ส.'];\n  MARKS = ['/','ส','ล','ก','ป','ค','ร','e','-'];\n  BLOCK = ['ล','ก','ป','ค','ร','e','-'];\n  FIXED = [[1,1,'วันขึ้นปีใหม่'],[4,6,'วันจักรี'],[4,13,'วันสงกรานต์'],[4,14,'วันสงกรานต์'],[4,15,'วันสงกรานต์'],[5,1,'วันแรงงานแห่งชาติ'],[5,4,'วันฉัตรมงคล'],[6,3,'วันเฉลิมพระชนมพรรษาพระราชินี'],[7,28,'วันเฉลิมพระชนมพรรษา ร.10'],[8,12,'วันแม่แห่งชาติ'],[10,13,'วันนวมินทรมหาราช'],[10,23,'วันปิยมหาราช'],[12,5,'วันพ่อแห่งชาติ'],[12,10,'วันรัฐธรรมนูญ'],[12,31,'วันสิ้นปี']];\n  LUNAR = {\n    2568:[[2,12,'วันมาฆบูชา'],[5,9,'วันพืชมงคล'],[5,11,'วันวิสาขบูชา'],[7,10,'วันอาสาฬหบูชา'],[7,11,'วันเข้าพรรษา']],\n    2569:[[1,2,'วันหยุดพิเศษ (มติ ครม.)'],[3,3,'วันมาฆบูชา'],[5,13,'วันพืชมงคล'],[5,31,'วันวิสาขบูชา'],[7,29,'วันอาสาฬหบูชา'],[7,30,'วันเข้าพรรษา']],\n    2570:[[2,21,'วันมาฆบูชา'],[5,20,'วันวิสาขบูชา'],[7,18,'วันอาสาฬหบูชา'],[7,19,'วันเข้าพรรษา']]\n  };\n  constructor(p){\n    super(p);\n    let s = null;\n    try { s = JSON.parse(localStorage.getItem('dutyRosterV1')); } catch(e) {}\n    const now = new Date();\n    this.state = (s && s.doctors) ? {...s, editing:null, toast:'', autoIssues:[]} : {\n      y: now.getFullYear()+543, m: now.getMonth(),\n      doctors: [{id:1,name:'นพ.สมชาย ใจดี'},{id:2,name:'พญ.สุดา รักษาดี'},{id:3,name:'นพ.วิชัย มั่นคง'},{id:4,name:'พญ.อรทัย แสงทอง'}],\n      months:{}, editing:null, toast:'', autoIssues:[]\n    };\n    Object.values(this.state.months||{}).forEach(mo=>{\n      const cons = mo.cons||{}, grid = mo.grid||(mo.grid={});\n      Object.keys(cons).forEach(id=>{\n        const c = cons[id]||{}, g = grid[id]||(grid[id]={});\n        (c.leave||[]).forEach(d=>{ if (!g[d]) g[d]='ล'; });\n        (c.avoid||[]).forEach(d=>{ if (!g[d]) g[d]='-'; });\n      });\n      delete mo.cons;\n    });\n    if (!this.state.tab) this.state.tab = 'roster';\n    if (!Array.isArray(this.state.positions) || !this.state.positions.length) this.state.positions = [{id:1,name:'นายแพทย์ชำนาญการ'},{id:2,name:'นายแพทย์ปฏิบัติการ'}];\n    if (!Array.isArray(this.state.p4ps) || !this.state.p4ps.length) this.state.p4ps = [{id:1,name:'ทำงานโรงพยาบาลชุมชน 1-2 ปี',amt:10000},{id:2,name:'ทำงานโรงพยาบาลชุมชน 3-10 ปี',amt:20000},{id:3,name:'ทำงานโรงพยาบาลชุมชน มากกว่า 10 ปี',amt:25000}];\n    this.state.doctors = this.state.doctors.map(d=>({...d, pos: d.pos || this.state.positions[0].id, p4p: d.p4p || this.state.p4ps[0].id}));\n    if (this.state.hospital === undefined) this.state.hospital = '';\n    if (this.state.preparer === undefined) this.state.preparer = '';\n    if (this.state.preparerPos === undefined) this.state.preparerPos = 'นายแพทย์ชำนาญการ';\n    if (this.state.payNote === undefined) this.state.payNote = '*** ไปราชการการนับวันทำการให้ไม่เกิน ๑๐ วัน';\n  }\n  persist(){ const {editing,toast,autoIssues,analyzing,...d} = this.state; try { localStorage.setItem('dutyRosterV1', JSON.stringify(d)); } catch(e) {} }\n  pickUpload(){\n    if (this.state.analyzing) return;\n    if (!window.claude || !window.claude.complete){ this.flashToast('ฟีเจอร์วิเคราะห์ด้วย AI ใช้ได้เฉพาะเมื่อเปิดผ่านแอป (ไฟล์ standalone ใช้ไม่ได้)'); return; }\n    const inp = document.createElement('input');\n    inp.type = 'file';\n    inp.accept = 'image/png,image/jpeg,image/webp,image/gif,.txt,.csv,.tsv';\n    inp.onchange = ()=>{ if (inp.files && inp.files[0]) this.analyzeUpload(inp.files[0]); };\n    inp.click();\n  }\n  importPrompt(){\n    return 'คุณจะได้รับตารางเวรแพทย์ประจำเดือน (อาจเป็นรูปถ่าย/สแกน หรือข้อความ) ให้อ่านแล้วตอบเป็น JSON ล้วน ๆ เท่านั้น ห้ามมีข้อความอื่น รูปแบบ:\\n'\n      +'{\"month\":<เลขเดือน 1-12 ถ้าระบุในตาราง>,\"year\":<ปี พ.ศ. ถ้าระบุ>,\"doctors\":[{\"name\":\"ชื่อแพทย์ตามตาราง\",\"days\":{\"<วันที่ 1-31>\":\"<สัญลักษณ์>\"}}]}\\n'\n      +'สัญลักษณ์ที่อนุญาต: \"/\" = อยู่เวร 24 ชม., \"ส\" = เวรเสริม (เวรเช้า 8.00-16.00), \"ก\" = ลากิจ, \"ป\" = ลาป่วย, \"ล\" = ลาพักผ่อน, \"ค\" = ลาคลอดบุตร, \"ร\" = ไปราชการ, \"e\" = elective, \"-\" = ไม่อยู่เวร\\n'\n      +'ใส่เฉพาะช่องที่มีสัญลักษณ์ ช่องว่างไม่ต้องใส่ ถ้าตารางต้นทางใช้สัญลักษณ์อื่น ให้ตีความเป็นสัญลักษณ์ที่ใกล้เคียงที่สุดจากรายการข้างต้น ถ้าปีเป็น ค.ศ. ให้บวก 543 เป็น พ.ศ.';\n  }\n  async analyzeUpload(file){\n    this.setState({analyzing:true});\n    this.flashToast('กำลังวิเคราะห์ตารางเวรด้วย AI...');\n    try {\n      let content;\n      if (file.type && file.type.startsWith('image/')){\n        const b64 = await new Promise((res,rej)=>{ const r = new FileReader(); r.onload = ()=>res(String(r.result).split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });\n        content = [{type:'image', source:{type:'base64', media_type:file.type, data:b64}}, {type:'text', text:this.importPrompt()}];\n      } else {\n        const txt = await file.text();\n        content = this.importPrompt()+'\\n\\nข้อมูลตารางเวร:\\n'+txt.slice(0,30000);\n      }\n      const resp = await window.claude.complete({model:'claude-sonnet-4-5', max_tokens:16000, messages:[{role:'user', content}]});\n      const mt = String(resp).match(/\\{[\\s\\S]*\\}/);\n      if (!mt) throw new Error('อ่านผลลัพธ์ไม่ได้');\n      this.applyImport(JSON.parse(mt[0]));\n    } catch(e) {\n      this.flashToast('วิเคราะห์ไม่สำเร็จ: '+((e && e.message) || 'ลองรูปที่ชัดขึ้น หรือครอปเฉพาะตาราง'));\n    }\n    this.setState({analyzing:false});\n  }\n  applyImport(data){\n    const upd = {};\n    if (+data.year > 2500) upd.y = +data.year;\n    if (+data.month >= 1 && +data.month <= 12) upd.m = +data.month-1;\n    const doctors = this.state.doctors.slice();\n    let nextId = Math.max(0,...doctors.map(d=>d.id))+1;\n    const norm = s=>String(s||'').replace(/\\s+/g,'').replace(/^(นพ\\.|พญ\\.|ทพญ\\.|ทพ\\.|ภญ\\.|ภก\\.)/,'');\n    const grid = {};\n    let nCells = 0;\n    (Array.isArray(data.doctors) ? data.doctors : []).forEach(dd=>{\n      if (!dd || !dd.name) return;\n      let doc = doctors.find(d=>norm(d.name)===norm(dd.name)) || doctors.find(d=>norm(d.name) && (norm(d.name).includes(norm(dd.name))||norm(dd.name).includes(norm(d.name))));\n      if (!doc){ doc = {id:nextId++, name:String(dd.name).trim(), pos:(this.state.positions[0]||{}).id, p4p:(this.state.p4ps[0]||{}).id}; doctors.push(doc); }\n      const g = {};\n      Object.keys(dd.days||{}).forEach(k=>{\n        let v = String(dd.days[k]||'').trim(); if (v==='E') v = 'e';\n        const d = +k;\n        if (this.MARKS.includes(v) && d>=1 && d<=31){ g[d] = v; nCells++; }\n      });\n      grid[doc.id] = g;\n    });\n    if (!nCells && !Object.keys(grid).length){ this.flashToast('ไม่พบข้อมูลตารางเวรในไฟล์ที่อัปโหลด'); return; }\n    const y = upd.y || this.state.y, m = upd.m !== undefined ? upd.m : this.state.m;\n    const key = y+'-'+m;\n    const mo = JSON.parse(JSON.stringify(this.state.months[key] || {grid:{},holOv:{}}));\n    mo.grid = mo.grid || {}; mo.holOv = mo.holOv || {};\n    Object.keys(grid).forEach(id=>{ mo.grid[id] = grid[id]; });\n    this.set({...upd, doctors, months:{...this.state.months,[key]:mo}, tab:'roster', autoIssues:[]});\n    this.flashToast('นำเข้าตารางเวรแล้ว: '+Object.keys(grid).length+' รายชื่อ · '+nCells+' ช่อง ('+this.MN[m]+' '+y+')');\n  }\n  exportAllDocs(){\n    // ต้องยิงดาวน์โหลดทั้งหมดภายใน user gesture เดียว ไม่งั้นเบราว์เซอร์บล็อกไฟล์ที่ 2 เป็นต้นไป\n    this.exportDoc(); this.exportPayDoc(); this.exportEvidDoc();\n    this.exportFormalDoc(); this.exportSummaryDoc(); this.exportOtDoc();\n    this.flashToast('ดาวน์โหลดเอกสาร Word 6 ไฟล์ — ถ้าเบราว์เซอร์ถามให้กด \"อนุญาต\" ดาวน์โหลดหลายไฟล์');\n  }\n  set(p){ this.setState(p, ()=>this.persist()); }\n  key(){ return this.state.y+'-'+this.state.m; }\n  md(){ return this.state.months[this.key()] || {grid:{},holOv:{}}; }\n  updM(fn){ const m = JSON.parse(JSON.stringify(this.md())); m.grid=m.grid||{}; m.holOv=m.holOv||{}; fn(m); this.set({months:{...this.state.months,[this.key()]:m}}); }\n  gap(){ return this.props.gapDays ?? 2; }\n  exemptSNext(name){ return ['พิมพ์ชนก  0, rr = 0;\n      const cells = days.map(dy=>{\n        const base = {border:'1px solid #888',textAlign:'center',fontSize:'12px',padding:'1px 0',minWidth:'20px'};\n        if (dy.off) return {k:'p'+dc.id+'-'+dy.d, t:'', st:{...base,background:'#d9d6cf'}};\n        const v = g[dy.d]||'';\n        let t = '/';\n        if (v==='ก'||v==='ป'||v==='ค'){ t = v; la++; }\n        else if (v==='ล'){ t = 'ผ'; la++; }\n        else if (v==='ร'){ t = 'ร'; rr++; }\n        else if (v==='e'){ t = 'ร'; rr++; }\n        else nk++;\n        return {k:'p'+dc.id+'-'+dy.d, t, st:{...base,background:'#fff'}};\n      });\n      rr = Math.min(rr,10);\n      const p = posOf(dc), amt = +(p4pOf(dc).amt)||0;\n      payTotal += amt;\n      return {\n        k:dc.id, no:this.tn(i+1), name:dc.name||'', pos:p.name||'', cells,\n        nk: nk?this.tn(nk):'', la: la?this.tn(la):'', r: rr?this.tn(rr):'', sum: this.tn(nk+rr),\n        amt: amt?this.tn(amt.toLocaleString('en-US')):''\n      };\n    });\n    const payDays = days.map(dy=>({k:'pd'+dy.d, t:this.tn(dy.d), st:{border:'1px solid #888',fontSize:'11px',padding:'1px 0',textAlign:'center',minWidth:'20px',background:dy.off?'#d9d6cf':'#f3f1ec',fontWeight:'400'}}));\n    const evidRows = [];\n    const evidWho = {};\n    days.forEach(dy=>{\n      let first = true;\n      doctors.forEach(dc=>{\n        const v = (grid[dc.id]||{})[dy.d];\n        let shifts = [];\n        if (v==='/') shifts = dy.off ? [[8,16],[16,24],[24,8]] : [[16,24],[24,8]];\n        else if (v==='ส') shifts = [[8,16]];\n        if (shifts.length) evidWho[dc.id] = 1;\n        shifts.forEach(([a,b])=>{\n          evidRows.push({k:'e'+dy.d+'-'+dc.id+'-'+a, day:first?this.tn(dy.d):'', name:dc.name||'', pos:posOf(dc).name||'', tin:this.tn(a)+'.๐๐', tout:this.tn(b)+'.๐๐'});\n          first = false;\n        });\n      });\n    });\n    const evidN = Object.keys(evidWho).length;\n    const stripT = n=>String(n||'').replace(/^(นพ\\.|พญ\\.|ทพญ\\.|ทพ\\.|ภญ\\.|ภก\\.)\\s*/,'');\n    const ัติงาน-':tab==='ot'?'หลักฐานจ่ายเงิน-':'ตารางเวร-')+this.MN[m]+'-'+y+'.png';\n        a.href = cv.toDataURL('image/png');\n        a.click();\n        this.flashToast('บันทึกรูปแล้ว');\n      }).finally(()=>{\n        card.style.overflowX = prevOv; el.style.width = prevW; el.style.minWidth = ''; el.style.padding = ''; el.style.background = '';\n      });\n    };\n    return {\n      tabs, isRoster: tab==='roster', isInfo: tab==='info', isPay: tab==='pay', isEvid: tab==='evid', isFormal: tab==='formal', isSummary: tab==='summary', isOt: tab==='ot', notInfo: tab!=='info',\n      ...(()=>{\n        const {rows, grand, otRate, autRate} = this.otData();\n        const fmt = n=>n?this.tn(n.toLocaleString('en-US')):'';\n        const tdB = {border:'1px solid #888',fontSize:'12px',textAlign:'center',padding:'2px 2px'};\n        const otRows = [];\n        rows.forEach(r=>{\n          otRows.push({k:'ot'+r.dc.id, isMain:true, isAut:false, name:r.dc.name||'', rate:fmt(otRate),\n            cells: days.map((dy,i)=>({k:'oc'+r.dc.id+'-'+dy.d, t:'/'.repeat(r.shifts[i]), st:{...tdB,background:dy.off?'#d9d6cf':'#fff',whiteSpace:'nowrap'}})),\n            wd: r.nWd?this.tn(r.nWd):'๐', hol: r.nHol?this.tn(r.nHol):'๐', tot: this.tn(r.total), aut:'', m1: fmt(r.m1), remain: fmt(r.remain)});\n          otRows.push({k:'ota'+r.dc.id, isMain:false, isAut:true, name:'ออกชันสูตรพลิกศพ', rate:fmt(autRate),\n            cells: days.map((dy,i)=>({k:'oa'+r.dc.id+'-'+dy.d, v:r.autStr[i], onChange:(e=>this.setAut(r.dc.id,dy.d,e.target.value)),\n              tdSt:{...tdB,padding:'0',background:dy.off?'#d9d6cf':'#fff'},\n              st:{width:'100%',height:'100%',minHeight:'22px',border:'none',outline:'none',background:'transparent',textAlign:'center',fontFamily:'inherit',fontSize:'12px',padding:'0',boxSizing:'border-box'}})),\n            wd:'', hol:'', tot:'', aut: r.nAut?this.tn(r.nAut):'๐', m1: fmt(r.m2), remain:''});\n        });\n        return {otRows, otGrandText: this.thBaht(grand), otGrandAmt: fmt(grand)};\n      })(),\n      formalRows,\n      sumTitle1: 'สรุปวันปฏิบัติงานประกอบการจ่ายเงิน แพทย์ ทันตแพทย์ เภสัชกร ไม่ทำเวชปฏิบัติส่วนตัวฯ ประจำ'+(hospital||'โรงพยาบาล..............................'),\n      sumTitle2: 'ประจำเดือน '+this.MN[m]+' '+this.tn(y),\n      evidRows,\n      evidTitle2: (hospital||'โรงพยาบาล..............................')+' ประจำเดือน '+this.MN[m]+' '+this.tn(y),\n      evidTotal: this.tn(evidN)+' คน',\n      evidCome: this.tn(evidN)+' คน',\n      evidAbsent: '- คน',\n      monthTitle: 'ตารางเวรเดือน'+this.MN[m]+' พ.ศ. '+y,\n      monthName: this.MN[m],\n      ruleSt: {width:'64px',height:'3px',background:accent,margin:'0 auto',borderRadius:'2px'},\n      onExport,\n      curM: String(m), curY: String(y),\n      monthOpts: this.MN.map((n,i)=>({v:String(i),label:n})),\n      yearOpts: [2567,2568,2569,2570,2571,2572].map(v=>({v:String(v),label:'พ.ศ. '+v})),\n      onMonth: e=>this.set({m:+e.target.value,autoIssues:[]}),\n      onYear: e=>this.set({y:+e.target.value,autoIssues:[]}),\n      onAdd: ()=>this.addDoc(),\n      onAuto: ()=>this.auto(),\n      onSave: ()=>{ this.persist(); this.flashToast('บันทึกข้อมูลลงเครื่องแล้ว'); },\n      onSaveAs: e=>{\n        const v = e.target.value; e.target.value = '';\n        if (v==='all'){ this.exportAllDocs(); return; }\n        if (tab==='info'){ this.flashToast('หน้าข้อมูลไม่มีเอกสารให้บันทึก — เปิดหน้าตาราง/ใบเบิกก่อน'); return; }\n        if (v==='doc'){ tab==='formal' ? this.exportFormalDoc() : tab==='summary' ? this.exportSummaryDoc() : tab==='pay' ? this.exportPayDoc() : tab==='evid' ? this.exportEvidDoc() : tab==='ot' ? this.exportOtDoc() : this.exportDoc(); }\n        else if (v==='png') onExport();\n      },\n      onPrint: ()=>window.print(),\n      onUpload: ()=>this.pickUpload(),\n      uploadLabel: this.state.analyzing ? 'กำลังวิเคราะห์...' : 'อัปโหลด + วิเคราะห์',\n      uploadBtnSt: {fontFamily:'inherit',fontSize:'14px',fontWeight:'600',padding:'8px 14px',border:'1px dashed '+accent,borderRadius:'6px',background:'#fff',color:accent,cursor:this.state.analyzing?'wait':'pointer',opacity:this.state.analyzing?.6:1},\n      onDoc: ()=>{ tab==='formal' ? this.exportFormalDoc() : tab==='summary' ? this.exportSummaryDoc() : tab==='pay' ? this.exportPayDoc() : tab==='evid' ? this.exportEvidDoc() : tab==='ot' ? this.exportOtDoc() : this.exportDoc(); },\n      autoBtnSt: {fontFamily:'inherit',fontSize:'14px',fontWeight:'700',padding:'8px 16px',border:'1px solid '+accent,borderRadius:'6px',background:accent,color:'#fff',cursor:'pointer'},\n      dayHead, rows, footCells,\n      hasWarn: warnings.length>0, warnCount: warnings.length, warnings,\n      grandLine: 'สรุปทั้งเดือน: เวรทั้งหมด '+(wdAll*2+holAll*3+sAll)+' เวร · วันธรรมดา '+wdAll+' วัน ('+(wdAll*2)+' เวร) · วันหยุด '+holAll+' วัน ('+(holAll*3)+' เวร) · เวรเสริม '+sAll+' เวร',\n      hospital: hospital||'', onHospital: e=>this.set({hospital:e.target.value}),\n      preparer: preparer||'', onPreparer: e=>this.set({preparer:e.target.value}),\n      preparerShow: preparer||'..............................',\n      preparerPos: preparerPos||'', onPreparerPos: e=>this.set({preparerPos:e.target.value}),\n      posRows, onAddPos: ()=>this.addPos(),\n      p4pRows, onAddP4p: ()=>this.addP4p(),\n      docRows, holChips,\n      nDays: days.length, totSpan: days.length+4,\n      payDays, payRows,\n      payTitle2: 'สำหรับแพทย์ '+(hospital||'โรงพยาบาล..............................')+' ประจำเดือน '+this.MN[m]+' '+this.tn(y),\n      payTotalText: this.thBaht(payTotal),\n      payTotalAmt: payTotal?this.tn(payTotal.toLocaleString('en-US')):'',\n      payNote: payNote||'', onPayNote: e=>this.set({payNote:e.target.value}),\n      hasToast: !!toast, toastTxt: toast\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
